name: muslim_app
description: تطبيق إسلامي شامل (قرآن، أذكار، مواقيت، قبلة، تقويم هجري)

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # أيقونات وخطوط
  cupertino_icons: ^1.0.5
  font_awesome_flutter: ^10.5.0

  # إدارة الحالة
  flutter_riverpod: ^2.6.1
  provider: ^6.1.1

  # التنقل
  go_router: ^14.8.1

  # التخزين المحلي
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # الموقع والقبلة
  geolocator: ^13.0.4
  flutter_qiblah: ^3.1.0+1
  flutter_compass_v2: ^1.0.3

  # القرآن والأذكار
  http: ^1.5.0
  intl: ^0.20.2
  just_audio: ^0.10.5

  # Firebase integration
  firebase_core: ^3.15.2
  firebase_auth: ^5.6.2
  cloud_firestore: ^5.6.11
  firebase_messaging: ^15.2.10
  firebase_analytics: ^11.5.2
  firebase_remote_config: ^5.4.7
  firebase_app_check: ^0.3.2+10
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4

  # التقويم الهجري
  hijri: ^3.0.0

  # إشعارات الأذان
  flutter_local_notifications: ^19.4.2
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/quran/
    - assets/azkar/

  fonts:
    - family: Lateef
      fonts:
        - asset: assets/fonts/Lateef-Regular.ttf
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700